<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium App Store Pro</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --dark-bg: #0b0f19;
            --card-bg: #111827;
            --input-bg: #1f2937;
            --text-light: #f9fafb;
            --text-gray: #9ca3af;
            --border-color: #374151;
            --overlay: rgba(0, 0, 0, 0.7);
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: var(--dark-bg);
            color: var(--text-light);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            padding-bottom: 75px;
            overflow-x: hidden;
        }

        /* Smooth Top Header */
        .header {
            background-color: var(--card-bg);
            padding: 16px 20px;
            text-align: center;
            font-size: 18px;
            font-weight: 600;
            border-bottom: 1px solid var(--border-color);
            position: sticky; top: 0; z-index: 100;
            letter-spacing: 0.5px;
        }

        .container { max-width: 1000px; margin: 25px auto; padding: 0 20px; }
        
        /* Smooth Dynamic Transitions */
        .page { display: none; opacity: 0; transform: translateY(10px); transition: all 0.3s ease; }
        .page.active { display: block; opacity: 1; transform: translateY(0); }

        /* Modern Grid Architecture */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        .app-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 20px;
            display: flex; flex-direction: column; justify-content: space-between;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .app-card:hover { transform: translateY(-4px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); }
        .app-header { display: flex; align-items: center; gap: 16px; }
        .app-icon { width: 64px; height: 64px; border-radius: 14px; object-fit: cover; border: 1px solid var(--border-color); }
        .app-title { font-size: 16px; font-weight: 600; margin: 0; color: var(--text-light); }
        .app-meta { font-size: 12px; color: var(--text-gray); margin-top: 4px; }
        .app-desc { font-size: 13px; color: var(--text-gray); margin: 15px 0; height: 38px; overflow: hidden; }
        
        .download-btn {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            background-color: var(--primary); color: white; text-decoration: none; 
            padding: 12px; border-radius: 10px; font-weight: 600; font-size: 14px; 
            transition: background 0.2s; border: none; cursor: pointer;
        }
        .download-btn:hover { background-color: var(--primary-hover); }

        /* Search Section UI */
        .search-container { position: relative; width: 100%; margin-bottom: 25px; }
        .search-bar {
            width: 100%; padding: 14px 14px 14px 45px; border-radius: 10px;
            border: 1px solid var(--border-color); background-color: var(--card-bg);
            color: white; font-size: 15px; outline: none; transition: border-color 0.2s;
        }
        .search-bar:focus { border-color: var(--primary); }
        .search-icon-inside { position: absolute; left: 15px; top: 15px; width: 18px; height: 18px; fill: var(--text-gray); }

        /* Profile & Header Actions */
        .profile-wrapper { position: relative; }
        .profile-card {
            background-color: var(--card-bg); padding: 30px 20px;
            border-radius: 14px; text-align: center; border: 1px solid var(--border-color);
        }
        .pfp { width: 96px; height: 96px; border-radius: 50%; border: 3px solid var(--primary); object-fit: cover; }
        .profile-name { font-size: 20px; font-weight: 600; margin-top: 12px; }
        .profile-username { color: var(--text-gray); font-size: 13px; margin-top: 2px; }
        
        /* Floating Action Upload Plus Button */
        .upload-trigger-btn {
            position: absolute; top: 0; right: 0; background: var(--input-bg);
            border: 1px solid var(--border-color); border-radius: 10px; padding: 10px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: background 0.2s;
        }
        .upload-trigger-btn:hover { background: var(--border-color); }
        .upload-trigger-btn svg { width: 20px; height: 20px; fill: var(--text-light); }

        /* Ultra-Smooth Upload Modal Window */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--overlay); display: flex; align-items: center;
            justify-content: center; z-index: 2000; opacity: 0; pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .modal.open { opacity: 1; pointer-events: auto; }
        .modal-content {
            background-color: var(--card-bg); border: 1px solid var(--border-color);
            width: 90%; max-width: 500px; padding: 25px; border-radius: 16px;
            transform: scale(0.9); transition: transform 0.3s ease;
            max-height: 85vh; overflow-y: auto;
        }
        .modal.open .modal-content { transform: scale(1); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .modal-title { font-size: 18px; font-weight: 600; }
        .close-btn { background: none; border: none; cursor: pointer; fill: var(--text-gray); display: flex; }
        
        /* Form Styling */
        .form-group { margin-bottom: 16px; }
        .form-label { display: block; font-size: 13px; color: var(--text-gray); margin-bottom: 6px; font-weight: 500; }
        .form-input {
            width: 100%; padding: 11px; border-radius: 8px; border: 1px solid var(--border-color);
            background-color: var(--input-bg); color: white; font-size: 14px; outline: none;
        }
        .form-input:focus { border-color: var(--primary); }

        /* Professional Bottom Navigation using SVGs */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background-color: var(--card-bg); height: 65px;
            display: flex; justify-content: space-around; align-items: center;
            border-top: 1px solid var(--border-color); z-index: 1000;
        }
        .nav-item {
            color: var(--text-gray); text-decoration: none;
            font-size: 11px; font-weight: 500; display: flex; flex-direction: column;
            align-items: center; gap: 4px; cursor: pointer; transition: color 0.2s;
        }
        .nav-item svg { width: 22px; height: 22px; fill: var(--text-gray); transition: fill 0.2s; }
        .nav-item.active { color: var(--primary); }
        .nav-item.active svg { fill: var(--primary); }
    </style>
</head>
<body>

    <div class="header" id="header-title">Home</div>

    <div class="container">
        <div id="page-home" class="page active">
            <div id="home-apps" class="grid"></div>
        </div>

        <div id="page-search" class="page">
            <div class="search-container">
                <svg class="search-icon-inside" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                <input type="text" id="search-input" class="search-bar" placeholder="Search verified apps or games...">
            </div>
            <div id="search-results" class="grid"></div>
        </div>

        <div id="page-ranking" class="page">
            <div id="ranking-apps" class="grid"></div>
        </div>

        <div id="page-profile" class="page">
            <div class="profile-wrapper">
                <button class="upload-trigger-btn" onclick="toggleModal(true)" title="Upload New APK">
                    <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                </button>
                
                <div class="profile-card">
                    <img src="https://img.icons8.com/clouds/200/user.png" class="pfp" alt="User Avatar">
                    <div class="profile-name">Developer Admin</div>
                    <div class="profile-username">@marketadmin</div>
                    <hr style="border: 0; border-top: 1px solid var(--border-color); margin: 25px 0;">
                    <div style="text-align: left;">
                        <h4 style="margin-bottom: 8px;">Uploaded Ecosystem Logs</h4>
                        <p style="font-size: 13px; color: var(--text-gray);">Dashboard is directly synchronized with your Firebase node cluster.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal" id="upload-modal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">Deploy New Application</div>
                <button class="close-btn" onclick="toggleModal(false)">
                    <svg style="width:24px; height:24px;" viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></button>
                </div>
            </div>
            <form id="upload-form" onsubmit="handleAppSubmit(event)">
                <div class="form-group"><label class="form-label">App/Game Name</label><input type="text" id="form-name" class="form-input" required placeholder="e.g., Cyber Crossfire"></div>
                <div class="form-group"><label class="form-label">Icon URL</label><input type="url" id="form-icon" class="form-input" required placeholder="https://domain.com/icon.png"></div>
                <div class="form-group"><label class="form-label">Version</label><input type="text" id="form-version" class="form-input" required placeholder="e.g., v1.0.4"></div>
                <div class="form-group"><label class="form-label">Size (MB)</label><input type="text" id="form-size" class="form-input" required placeholder="e.g., 42 MB"></div>
                <div class="form-group"><label class="form-label">Description</label><input type="text" id="form-desc" class="form-input" required placeholder="Short application summary..."></div>
                <div class="form-group"><label class="form-label">APK Download Link</label><input type="url" id="form-link" class="form-input" required placeholder="https://mediafire.com/file.apk"></div>
                <button type="submit" class="download-btn" style="width: 100%; margin-top: 10px;">Publish Live Market</button>
            </form>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="switchPage('home', 'Home')">
            <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg><span>Home</span>
        </div>
        <div class="nav-item" onclick="switchPage('search', 'Search')">
            <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg><span>Search</span>
        </div>
        <div class="nav-item" onclick="switchPage('ranking', 'Ranking')">
            <svg viewBox="0 0 24 24"><path d="M16 6l2.29 2.29-4.88 4.88-4-4L2 16.59 3.41 18l6-6 4 4 6.3-6.29L22 12V6z"/></svg><span>Ranking</span>
        </div>
        <div class="nav-item" onclick="switchPage('profile', 'Profile')">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg><span>Profile</span>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
        // CONFIG REQUIREMENT: Replace with your original setup credentials
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            databaseURL: "YOUR_DATABASE_URL",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        let allApps = [];

        // 1. SYSTEM TAB PAGE NAVIGATION
        function switchPage(pageId, title) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            
            const selectedPage = document.getElementById(`page-${pageId}`);
            selectedPage.classList.add('active');
            document.getElementById('header-title').innerText = title;
            event.currentTarget.classList.add('active');

            if(pageId === 'ranking') loadRankings();
            if(pageId === 'search') renderApps(allApps, 'search-results');
        }

        // 2. MODAL WINDOW INTERACTION LOGIC
        function toggleModal(open) {
            const modal = document.getElementById('upload-modal');
            if(open) modal.classList.add('open');
            else modal.classList.remove('open');
        }

        // 3. BACKEND CORE READ OPERATION
        database.ref('apps').on('value', (snapshot) => {
            const data = snapshot.val();
            allApps = data ? Object.keys(data).map(key => ({ id: key, ...data[key] })) : [];
            renderApps(allApps, 'home-apps');
        });

        function renderApps(appsList, containerId) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            if(appsList.length === 0) {
                container.innerHTML = '<p style="text-align:center;grid-column:1/-1;color:var(--text-gray);">No applications synced.</p>';
                return;
            }
            appsList.forEach(app => {
                container.innerHTML += `
                    <div class="app-card">
                        <div class="app-header">
                            <img src="${app.icon}" class="app-icon" onerror="this.src='https://img.icons8.com/color/144/android-os.png'">
                            <div>
                                <h3 class="app-title">${app.name}</h3>
                                <div class="app-meta">${app.version} • ${app.size}</div>
                                <div class="app-meta" style="color:var(--primary); font-weight:500;">Downloads: ${app.downloadCount || 0}</div>
                            </div>
                        </div>
                        <p class="app-desc">${app.description}</p>
                        <a href="${app.downloadUrl}" target="_blank" onclick="registerDownload('${app.id}')" class="download-btn">
                            <svg style="width:16px; height:16px; fill:white;" viewBox="0 0 24 24"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM17 13l-5 5-5-5h3V9h4v4h3z"/></svg>
                            Get APK
                        </a>
                    </div>
                `;
            });
        }

        // 4. CLIENT SIDE BACKEND WRITE (NO GITHUB RE-DEPLOY)
        function handleAppSubmit(e) {
            e.preventDefault();
            const newApp = {
                name: document.getElementById('form-name').value,
                icon: document.getElementById('form-icon').value,
                version: document.getElementById('form-version').value,
                size: document.getElementById('form-size').value,
                description: document.getElementById('form-desc').value,
                downloadUrl: document.getElementById('form-link').value,
                downloadCount: 0
            };

            // Push object dynamically into Firebase cluster node
            database.ref('apps').push(newApp)
                .then(() => {
                    document.getElementById('upload-form').reset();
                    toggleModal(false);
                    alert("Application status: Live on Market!");
                })
                .catch((error) => alert("Write error: " + error.message));
        }

        // 5. LIVE SEARCH QUERY ARCHITECTURE
        document.getElementById('search-input').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const filtered = allApps.filter(app => app.name.toLowerCase().includes(query));
            renderApps(filtered, 'search-results');
        });

        // 6. RANKING DYNAMIC CHART CALCULATION
        function loadRankings() {
            const sortedApps = [...allApps].sort((a, b) => (b.downloadCount || 0) - (a.downloadCount || 0));
            renderApps(sortedApps, 'ranking-apps');
        }

        // 7. DOWNLOAD COUNT AGGREGATION TRANSACTION
        function registerDownload(appId) {
            database.ref(`apps/${appId}/downloadCount`).transaction((count) => (count || 0) + 1);
        }
    </script>
</body>
</html>
